<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0B3C5D"/>
  <!-- X letter diagonals -->
  <line x1="14" y1="13" x2="50" y2="51" stroke="#1C5480" stroke-width="13" stroke-linecap="round"/>
  <line x1="50" y1="13" x2="14" y2="51" stroke="#1C5480" stroke-width="13" stroke-linecap="round"/>
  <!-- Scales horizontal beam -->
  <line x1="10" y1="24" x2="54" y2="24" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center vertical pillar -->
  <line x1="32" y1="9" x2="32" y2="24" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pen-nib top ornament -->
  <polygon points="32,5 29,12 35,12" fill="#D4AF37"/>
  <!-- Left scale strings -->
  <line x1="15" y1="24" x2="11" y2="37" stroke="#D4AF37" stroke-width="1.4"/>
  <line x1="15" y1="24" x2="19" y2="37" stroke="#D4AF37" stroke-width="1.4"/>
  <!-- Left pan -->
  <path d="M11 37 Q15 43 19 37" stroke="#D4AF37" stroke-width="2" fill="rgba(212,175,55,0.22)" stroke-linecap="round"/>
  <!-- Right scale strings -->
  <line x1="49" y1="24" x2="45" y2="37" stroke="#D4AF37" stroke-width="1.4"/>
  <line x1="49" y1="24" x2="53" y2="37" stroke="#D4AF37" stroke-width="1.4"/>
  <!-- Right pan -->
  <path d="M45 37 Q49 43 53 37" stroke="#D4AF37" stroke-width="2" fill="rgba(212,175,55,0.22)" stroke-linecap="round"/>
  <!-- Beam end dots -->
  <circle cx="15" cy="24" r="2.2" fill="#D4AF37"/>
  <circle cx="49" cy="24" r="2.2" fill="#D4AF37"/>
  <circle cx="32" cy="24" r="2.8" fill="#D4AF37"/>
  <!-- Pillar column base -->
  <rect x="30.5" y="24" width="3" height="18" rx="1" fill="#D4AF37" opacity="0.65"/>
  <rect x="28" y="42" width="8" height="2.5" rx="1.25" fill="#D4AF37" opacity="0.8"/>
</svg>
